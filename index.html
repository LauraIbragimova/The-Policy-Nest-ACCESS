<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Policy Nest - ACCESS Rollout Planner</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --background-color: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navigation Header */
        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand img {
            height: 40px;
            width: auto;
        }

        .brand h1 {
            font-size: 1.25rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        nav {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        nav a:hover, nav a.active {
            color: var(--primary-color);
        }

        /* Resource Link Styling */
        nav a.resource-link {
            background-color: #eff6ff;
            color: var(--secondary-color);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: 1px solid #bfdbfe;
        }

        nav a.resource-link:hover {
            background-color: #dbeafe;
            color: var(--primary-color);
        }

        /* Main Workspace Split Layout */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Left Side: Input/Configuration Workspace */
        .workspace-left {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
        }

        /* Right Side: Output Panel (Phase 2 Planner UI) */
        .workspace-right {
            width: 450px;
            background-color: var(--panel-bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
            box-shadow: -2px 0 5px rgba(0,0,0,0.02);
        }

        .panel-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-header h2 {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
        }

        /* Progress Tracking Components */
        .progress-container {
            width: 100%;
            background-color: var(--border-color);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.25rem;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #10b981;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* Accordion / Tabbed Container for Phases */
        .planner-accordion {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
        }

        .accordion-section {
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .accordion-header {
            background-color: #f8fafc;
            padding: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.9rem;
            user-select: none;
        }

        .accordion-header:hover {
            background-color: #f1f5f9;
        }

        .accordion-content {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            display: none;
            background-color: #ffffff;
        }

        .accordion-section.open .accordion-content {
            display: block;
        }

        /* Task Item List & Checkboxes */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            font-size: 0.875rem;
            line-height: 1.4;
        }

        .task-item input[type="checkbox"] {
            margin-top: 0.2rem;
            cursor: pointer;
        }

        .task-item.completed label {
            text-decoration: line-through;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Header & Navigation Updates -->
    <header>
        <div class="brand">
            <!-- References local repo asset "Policy Nest Logo.png" -->
            <img src="Policy Nest Logo.png" alt="The Policy Nest Logo">
            <h1>The Policy Nest</h1>
        </div>
        <nav>
            <a href="#" class="active">ACCESS Rollout Planner</a>
            <!-- Added ACCESS Resources link directly targeting the official CMS overview -->
            <a href="https://www.cms.gov/priorities/innovation/innovation-models/access" target="_blank" rel="noopener noreferrer" class="resource-link">ACCESS Resources ↗</a>
        </nav>
    </header>

    <main>
        <!-- Left Column Context: Workspace Canvas -->
        <div class="workspace-left">
            <h3>Configuration Panel</h3>
            <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">
                Adjust criteria parameters here to populate strategy pathways. The right sidebar handles immediate plan tracking.
            </p>
        </div>

        <!-- Right Column Context: Phase 2 Output Panel Dashboard -->
        <div class="workspace-right">
            <div class="panel-header">
                <h2>Rollout Strategy Status</h2>
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div id="progressText" class="progress-text">0% Complete (0/0 tasks)</div>
            </div>

            <!-- Dynamic Target Container for Accordion Layout -->
            <div id="plannerAccordion" class="planner-accordion">
                <!-- Fallback Loading Content -->
                <p style="color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-top: 2rem;">
                    Parsing templates structure...
                </p>
            </div>
        </div>
    </main>

    <!-- Phase 2 Pipeline Parsing Script Integration -->
    <script>
        // Simulating the structural template architecture based on 'data/access-template.json'
        // Replace or fetch this block dynamically with fetch('./data/access-template.json') once deployed.
        const fallbackTemplateData = {
            "phases": [
                {
                    "id": "phase1",
                    "title": "Phase 1: Operational Readiness",
                    "tasks": [
                        {"id": "t1", "text": "Review CMS state-specific baseline metrics data structures."},
                        {"id": "t2", "text": "Establish internal screening workflows & pipeline validation tools."}
                    ]
                },
                {
                    "id": "phase2",
                    "title": "Phase 2: Technical Infrastructure",
                    "tasks": [
                        {"id": "t3", "text": "Deploy browser interface application framework & sync schemas."},
                        {"id": "t4", "text": "Wire state progress bar event hooks into checklist state changes."}
                    ]
                },
                {
                    "id": "phase3",
                    "title": "Phase 3: Integration & Launch",
                    "tasks": [
                        {"id": "t5", "text": "Conduct end-to-end user validations against claims data engines."},
                        {"id": "t6", "text": "Go-live with baseline policy monitoring matrices."}
                    ]
                }
            ]
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Attempt to fetch file directly or fall back safely to data blueprint object
            fetch('data/access-template.json')
                .then(response => {
                    if (!response.ok) throw new Error('Network template fallback triggered');
                    return response.json();
                })
                .then(data => renderPlannerUI(data))
                .catch(() => renderPlannerUI(fallbackTemplateData));
        });

        function renderPlannerUI(data) {
            const container = document.getElementById('plannerAccordion');
            container.innerHTML = ''; 

            if (!data.phases || data.phases.length === 0) {
                container.innerHTML = `<p style="text-align:center; font-size:0.85rem; color:var(--text-muted);">No phase structure data found.</p>`;
                return;
            }

            data.phases.forEach((phase, index) => {
                const section = document.createElement('div');
                section.className = `accordion-section ${index === 0 ? 'open' : ''}`;
                
                // Build Accordion Tab Bar Header Elements
                const header = document.createElement('div');
                header.className = 'accordion-header';
                header.innerHTML = `<span>${phase.title}</span><span class="icon">➔</span>`;
                
                // Toggle Accordion View State Open/Closed Action
                header.addEventListener('click', () => {
                    section.classList.toggle('open');
                });

                const content = document.createElement('div');
                content.className = 'accordion-content';

                const ul = document.createElement('ul');
                ul.className = 'task-list';

                phase.tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = 'task-item';
                    li.innerHTML = `
                        <input type="checkbox" id="${task.id}" class="task-checkbox">
                        <label for="${task.id}">${task.text}</label>
                    `;
                    
                    // Toggle crossed out text styling visually on interactive click changes
                    const checkbox = li.querySelector('input');
                    checkbox.addEventListener('change', () => {
                        if (checkbox.checked) {
                            li.classList.add('completed');
                        } else {
                            li.classList.remove('completed');
                        }
                        calculateProgress();
                    });

                    ul.appendChild(li);
                });

                content.appendChild(ul);
                section.appendChild(header);
                section.appendChild(content);
                container.appendChild(section);
            });

            // Run an initial recalculation pass to establish operational baseline values
            calculateProgress();
        }

        function calculateProgress() {
            const checkboxes = document.querySelectorAll('.task-checkbox');
            const total = checkboxes.length;
            if (total === 0) return;

            const checked = document.querySelectorAll('.task-checkbox:checked').length;
            const percentage = Math.round((checked / total) * 100);

            // Directly drive updates to layout progress display indicators
            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('progressText').textContent = `${percentage}% Complete (${checked}/${total} tasks)`;
        }
    </script>
</body>
</html>
