<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Policy Nest - ACCESS Rollout Planner</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --background-color: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand img {
            height: 40px;
            width: auto;
        }

        .brand h1 {
            font-size: 1.25rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        nav {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
        }

        nav a.active {
            color: var(--primary-color);
        }

        main {
            flex: 1;
            display: flex;
            padding: 2rem;
        }

        .workspace-canvas {
            flex: 1;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="Policy Nest Logo.png" alt="The Policy Nest Logo">
            <h1>The Policy Nest</h1>
        </div>
        <nav>
            <a href="#" class="active">ACCESS Rollout Planner</a>
        </nav>
    </header>

    <main>
        <div class="workspace-canvas">
            <h3>Welcome to the ACCESS Rollout Planner</h3>
            <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">
                Your baseline workspace is loaded. Select template options to begin structuring the policy rollout timeline.
            </p>
        </div>
    </main>

</body>
</html>
